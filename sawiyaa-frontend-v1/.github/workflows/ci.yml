name: Dashboard CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  validate-and-build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: dafter-dashboard

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dafter-dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: i18n check
        run: npm run i18n:check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

