<body class="bg-background min-h-screen font-body-md text-on-background flex flex-col antialiased">
<!-- Header (Suppressed Navigation for Transactional Screen, only Logo) -->
<header class="w-full px-margin-mobile py-md flex items-center justify-start md:justify-center">
<h1 class="font-headline-md text-headline-md font-bold text-primary dark:text-primary-fixed-dim">Fayed</h1>
</header>
<!-- Main Content -->
<main class="flex-grow flex items-center justify-center px-margin-mobile py-lg">
<div class="w-full max-w-md">
<!-- Login Card -->
<div class="bg-surface-container-lowest rounded-xl p-md shadow-ambient">
<div class="text-center mb-lg">
<h2 class="font-headline-sm text-headline-sm text-on-surface mb-xs">تسجيل الدخول</h2>
<p class="font-body-md text-body-md text-on-surface-variant">مرحباً بك مجدداً في منصة فايد.</p>
</div>
<form class="space-y-sm">
<!-- Email Field -->
<div class="relative">
<label class="block font-label-md text-label-md text-on-surface mb-base" for="email">البريد الإلكتروني</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute right-3 text-outline-variant">mail</span>
<input class="w-full bg-background border border-background text-on-surface rounded-lg py-3 pr-10 pl-4 focus:ring-0 focus:border-primary transition-colors font-body-md text-body-md" id="email" name="email" placeholder="name@example.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="relative">
<label class="block font-label-md text-label-md text-on-surface mb-base" for="password">كلمة المرور</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute right-3 text-outline-variant">lock</span>
<input class="w-full bg-background border border-background text-on-surface rounded-lg py-3 pr-10 pl-10 focus:ring-0 focus:border-primary transition-colors font-body-md text-body-md" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button aria-label="Toggle password visibility" class="absolute left-3 text-outline-variant hover:text-primary focus:outline-none" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
</div>
<!-- Forgot Password Link -->
<div class="flex justify-start">
<a class="font-label-sm text-label-sm text-primary hover:text-primary-container transition-colors" href="#">هل نسيت كلمة المرور؟</a>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary text-on-primary font-label-md text-label-md rounded-lg py-3 mt-md hover:opacity-90 scale-98 transition-all duration-200 shadow-sm flex items-center justify-center gap-2" type="submit">
                        تسجيل الدخول
                        <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</form>
</div>
<!-- Developer Test Accounts Section -->
<div class="mt-lg border-t border-outline-variant/20 pt-md">
<h3 class="font-label-md text-label-md text-outline mb-sm flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]">bug_report</span>
                    حسابات اختبار المطورين
                </h3>
<div class="grid grid-cols-1 md:grid-cols-2 gap-sm">
<!-- Dev Account 1 -->
<button class="bg-surface-container-low hover:bg-surface-container-high transition-colors rounded-lg p-3 text-right flex flex-col items-start border border-transparent hover:border-outline-variant/30">
<span class="font-label-md text-label-md text-on-surface">مريض تجريبي</span>
<span class="font-label-sm text-label-sm text-on-surface-variant">patient@fayed.test</span>
</button>
<!-- Dev Account 2 -->
<button class="bg-surface-container-low hover:bg-surface-container-high transition-colors rounded-lg p-3 text-right flex flex-col items-start border border-transparent hover:border-outline-variant/30">
<span class="font-label-md text-label-md text-on-surface">طبيب تجريبي</span>
<span class="font-label-sm text-label-sm text-on-surface-variant">doctor@fayed.test</span>
</button>
</div>
</div>
</div>
</main>
<script>
        // Simple script to handle password visibility toggle
        document.addEventListener('DOMContentLoaded', () => {
            const toggleButton = document.querySelector('button[aria-label="Toggle password visibility"]');
            const passwordInput = document.getElementById('password');
            const icon = toggleButton.querySelector('.material-symbols-outlined');

            if (toggleButton && passwordInput && icon) {
                toggleButton.addEventListener('click', () => {
                    const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                    passwordInput.setAttribute('type', type);
                    icon.textContent = type === 'password' ? 'visibility_off' : 'visibility';
                });
            }
            
            // Dev accounts autofill (demo logic)
            const devButtons = document.querySelectorAll('.grid button');
            const emailInput = document.getElementById('email');
            
            devButtons.forEach(button => {
                button.addEventListener('click', () => {
                    const email = button.querySelector('.text-on-surface-variant').textContent;
                    if(emailInput) {
                        emailInput.value = email;
                        document.getElementById('password').value = 'password123';
                    }
                });
            });
        });
    </script>
