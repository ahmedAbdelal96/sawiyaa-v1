<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        body {
            background-color: theme('colors.background');
            color: theme('colors.on-background');
            -webkit-tap-highlight-color: transparent;
        }
        
        /* Subtle diffuse shadow for main container */
        .shadow-diffuse {
            box-shadow: 0 4px 20px rgba(22, 22, 22, 0.05);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="min-h-screen flex flex-col items-center pt-md pb-xl px-margin-mobile antialiased">
<!-- Header (Task Specific - Simple Back Navigation) -->
<header class="w-full max-w-md flex items-center justify-between mb-xl">
<button aria-label="العودة" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined text-primary" data-icon="arrow_forward">arrow_forward</span>
</button>
<h1 class="font-headline-md text-headline-md text-on-background">التفضيلات</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<!-- Main Content Canvas -->
<main class="w-full max-w-md flex-grow flex flex-col gap-lg">
<!-- Language Section -->
<section class="bg-surface-container-lowest rounded-xl p-md shadow-diffuse border border-surface-container-low">
<div class="flex items-center gap-xs mb-sm">
<span class="material-symbols-outlined text-primary" data-icon="language">language</span>
<h2 class="font-headline-sm text-headline-sm text-on-background">اللغة</h2>
</div>
<p class="font-body-md text-body-md text-on-surface-variant mb-md">اختر لغة العرض المفضلة للتطبيق.</p>
<!-- Segmented Control for Language -->
<div class="relative flex p-1 bg-surface-container-low rounded-lg w-full">
<!-- Active Indicator -->
<div class="absolute inset-y-1 right-1 w-[calc(50%-4px)] bg-primary-container rounded-md shadow-sm transition-transform duration-300 ease-in-out" id="lang-indicator"></div>
<button class="relative z-10 w-1/2 py-2 font-label-md text-label-md text-on-primary-container text-center focus:outline-none" id="btn-ar" onclick="setLanguage('ar')" type="button">
                    العربية
                </button>
<button class="relative z-10 w-1/2 py-2 font-label-md text-label-md text-on-surface-variant text-center focus:outline-none transition-colors" id="btn-en" onclick="setLanguage('en')" type="button">
                    English
                </button>
</div>
</section>
<!-- Timezone Section -->
<section class="bg-surface-container-lowest rounded-xl p-md shadow-diffuse border border-surface-container-low">
<div class="flex items-center gap-xs mb-sm">
<span class="material-symbols-outlined text-primary" data-icon="schedule">schedule</span>
<h2 class="font-headline-sm text-headline-sm text-on-background">المنطقة الزمنية</h2>
</div>
<!-- Alert/Note -->
<div class="bg-mint-accent border-r-4 border-primary rounded-l-lg p-3 mb-md flex items-start gap-3">
<span class="material-symbols-outlined text-primary mt-0.5 text-sm" data-icon="info">info</span>
<p class="font-body-md text-body-md text-on-surface-variant text-sm">تؤثر المنطقة الزمنية على جدول جلساتك.</p>
</div>
<!-- Custom Select Trigger -->
<div class="relative">
<label class="sr-only" for="timezone">المنطقة الزمنية</label>
<button aria-expanded="false" aria-haspopup="listbox" class="w-full flex items-center justify-between bg-surface-container-low px-4 py-3 rounded-lg border border-surface-variant hover:border-primary transition-colors focus:outline-none focus:ring-2 focus:ring-primary-fixed-dim" id="timezone-trigger" type="button">
<div class="flex flex-col text-right">
<span class="font-label-sm text-label-sm text-on-surface-variant mb-1">المنطقة الحالية</span>
<span class="font-body-md text-body-md text-on-background">توقيت غرينتش +3 (الرياض)</span>
</div>
<span class="material-symbols-outlined text-on-surface-variant" data-icon="expand_more">expand_more</span>
</button>
<!-- Hidden Select for form submission (conceptual) -->
<select class="hidden" id="timezone" name="timezone">
<option selected="" value="AST">Asia/Riyadh (AST)</option>
<option value="GMT">Europe/London (GMT)</option>
<option value="EST">America/New_York (EST)</option>
</select>
</div>
</section>
</main>
<!-- Bottom Action Area -->
<div class="w-full max-w-md fixed bottom-0 px-margin-mobile pb-safe pt-4 bg-background/90 backdrop-blur-md border-t border-surface-variant z-40">
<button class="w-full bg-primary hover:bg-surface-tint text-on-primary font-label-md text-label-md py-4 rounded-xl shadow-diffuse transition-transform active:scale-95 mb-md flex items-center justify-center gap-2">
<span class="material-symbols-outlined" data-icon="save">save</span>
            حفظ التغييرات
        </button>
</div>
<!-- Scripts for Micro-interactions -->
<script>
        function setLanguage(lang) {
            const indicator = document.getElementById('lang-indicator');
            const btnAr = document.getElementById('btn-ar');
            const btnEn = document.getElementById('btn-en');
            
            if (lang === 'ar') {
                indicator.style.transform = 'translateX(0)';
                btnAr.classList.replace('text-on-surface-variant', 'text-on-primary-container');
                btnEn.classList.replace('text-on-primary-container', 'text-on-surface-variant');
            } else {
                indicator.style.transform = 'translateX(-100%)'; // Move left for English in RTL
                btnEn.classList.replace('text-on-surface-variant', 'text-on-primary-container');
                btnAr.classList.replace('text-on-primary-container', 'text-on-surface-variant');
            }
        }
    </script>
</body></html>
