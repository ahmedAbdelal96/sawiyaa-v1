<!DOCTYPE html>

<html class="light" dir="rtl" lang="ar"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-variant": "#d8e3fc",
                    "on-tertiary": "#ffffff",
                    "secondary-fixed": "#d6e3ff",
                    "background": "#f9f9ff",
                    "inverse-surface": "#263144",
                    "surface-dim": "#cfdaf3",
                    "on-secondary-container": "#465c80",
                    "outline-variant": "#c2c6d3",
                    "on-primary-fixed": "#001b3c",
                    "on-secondary-fixed-variant": "#31476a",
                    "primary": "#0b5cac",
                    "tertiary-fixed-dim": "#bfc7d5",
                    "surface-bright": "#f9f9ff",
                    "on-tertiary-container": "#fdfcff",
                    "inverse-primary": "#a7c8ff",
                    "tertiary-fixed": "#dbe3f2",
                    "surface-container": "#e8eeff",
                    "on-tertiary-fixed": "#141c27",
                    "surface": "#f9f9ff",
                    "primary-container": "#3575c7",
                    "on-error-container": "#93000a",
                    "tertiary-container": "#6d7582",
                    "on-primary-container": "#fefcff",
                    "on-background": "#101c2e",
                    "outline": "#727783",
                    "error": "#ba1a1a",
                    "surface-container-lowest": "#ffffff",
                    "secondary-fixed-dim": "#b1c7f1",
                    "surface-container-highest": "#d8e3fc",
                    "primary-fixed": "#d5e3ff",
                    "secondary": "#495f83",
                    "on-surface": "#101c2e",
                    "surface-container-high": "#dfe8ff",
                    "primary-fixed-dim": "#a7c8ff",
                    "on-primary-fixed-variant": "#004689",
                    "on-error": "#ffffff",
                    "on-secondary": "#ffffff",
                    "error-container": "#ffdad6",
                    "inverse-on-surface": "#ecf0ff",
                    "secondary-container": "#bfd5ff",
                    "on-tertiary-fixed-variant": "#3f4753",
                    "on-surface-variant": "#424751",
                    "on-secondary-fixed": "#001b3c",
                    "surface-tint": "#125eae",
                    "tertiary": "#545d69",
                    "surface-container-low": "#f0f3ff",
                    "on-primary": "#ffffff"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Manrope"],
                    "body": ["Manrope"],
                    "label": ["Manrope"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Manrope', sans-serif; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col items-center">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#f9f9ff]/70 dark:bg-slate-950/70 backdrop-blur-md">
<div class="flex flex-row-reverse justify-between items-center w-full px-6 py-4 max-w-screen-xl mx-auto">
<div class="flex items-center gap-4">
<span class="text-[#3f7dcf] font-bold text-2xl">فايد</span>
</div>
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-surface-container-high overflow-hidden">
<img alt="User profile picture" class="w-full h-full object-cover" data-alt="close-up portrait of a calm smiling man with warm studio lighting and neutral background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAR7ue3sdR26GsmSOP1BZWC6-tULdTgEX8fId0AJl7ih_deDgGjsYFrocr33fi4JGHxnYbuV6rJiejQK90XabnRBs3M6nn8jCOu85vnDbcGQDiPVnA_sBZLjl_JBmSGf2pbB-d1UyMsMDRaDlDSiAJ0FTWDDvFsa9mfRtR8sObcBAw-RqNxxI-pwpUVUu3MAKKolxKhcALNpwpAAPb7BJWpn4ZPURrl6Z4g4MmFoMaE4B81AIorMlTxHJ2EtkEmIJ2jYdj_mZgtZGg"/>
</div>
<button class="text-[#3f7dcf] hover:bg-blue-50 dark:hover:bg-slate-800 transition-colors p-2 rounded-full">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
</button>
</div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center w-full px-6 pt-24 pb-32">
<div class="max-w-md w-full text-center flex flex-col items-center">
<!-- Asymmetrical Decorative Background Glow (Subtle) -->
<div class="absolute inset-0 overflow-hidden pointer-events-none">
<div class="absolute -top-[10%] -left-[10%] w-[50%] h-[50%] bg-primary-fixed/30 blur-[120px] rounded-full"></div>
<div class="absolute top-[40%] -right-[5%] w-[40%] h-[40%] bg-secondary-fixed/20 blur-[100px] rounded-full"></div>
</div>
<!-- Error Icon Container -->
<div class="relative mb-12">
<div class="w-32 h-32 rounded-full bg-surface-container-low flex items-center justify-center relative z-10">
<div class="w-24 h-24 rounded-full bg-surface-container-lowest shadow-sm flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-5xl" data-icon="cloud_off">cloud_off</span>
</div>
</div>
<!-- Soft ripple decoration -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-48 h-48 border border-primary/5 rounded-full"></div>
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-64 h-64 border border-primary/5 rounded-full"></div>
</div>
<!-- Error Content -->
<h1 class="text-3xl font-bold tracking-tight text-on-surface mb-4 font-headline">حدث خطأ ما</h1>
<p class="text-on-surface-variant text-lg leading-relaxed mb-10 max-w-[280px]">يرجى التحقق من اتصالك بالإنترنت والمحاولة مرة أخرى.</p>
<!-- Actions -->
<div class="w-full space-y-4">
<button class="w-full py-4 bg-gradient-to-r from-primary to-primary-container text-on-primary rounded-xl font-bold text-lg hover:opacity-90 transition-all active:scale-95 shadow-[0_12px_40px_rgba(11,92,172,0.15)]">
                    إعادة المحاولة
                </button>
<button class="w-full py-4 bg-surface-container-high text-on-secondary-container rounded-xl font-semibold hover:bg-surface-container-highest transition-colors">
                    العودة للرئيسية
                </button>
</div>
<!-- Bento-style Support Link (Subtle) -->
<div class="mt-16 p-6 bg-surface-container-low rounded-[1.5rem] w-full flex items-center justify-between hover:bg-surface-container-high transition-colors cursor-pointer group">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-white flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-xl" data-icon="support_agent">support_agent</span>
</div>
<div class="text-right">
<p class="text-sm font-bold text-on-surface">هل تحتاج مساعدة؟</p>
<p class="text-xs text-on-surface-variant">تواصل مع فريق الدعم الفني</p>
</div>
</div>
<span class="material-symbols-outlined text-on-surface-variant group-hover:-translate-x-1 transition-transform" data-icon="chevron_left">chevron_left</span>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full bg-white/70 dark:bg-slate-900/70 backdrop-blur-md rounded-t-[1.5rem] z-50 shadow-[0_-12px_40px_rgba(16,28,46,0.06)]">
<div class="flex flex-row-reverse justify-around items-center px-4 pb-6 pt-2">
<div class="flex flex-col items-center justify-center text-[#101c2e]/60 dark:text-slate-400 px-4 py-2 hover:bg-blue-50/50 dark:hover:bg-slate-800/50 transition-colors">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="text-[11px] font-medium leading-none mt-1">الرئيسية</span>
</div>
<div class="flex flex-col items-center justify-center text-[#101c2e]/60 dark:text-slate-400 px-4 py-2 hover:bg-blue-50/50 dark:hover:bg-slate-800/50 transition-colors">
<span class="material-symbols-outlined" data-icon="event_note">event_note</span>
<span class="text-[11px] font-medium leading-none mt-1">الجلسات</span>
</div>
<div class="flex flex-col items-center justify-center text-[#101c2e]/60 dark:text-slate-400 px-4 py-2 hover:bg-blue-50/50 dark:hover:bg-slate-800/50 transition-colors">
<span class="material-symbols-outlined" data-icon="chat_bubble">chat_bubble</span>
<span class="text-[11px] font-medium leading-none mt-1">المحادثة</span>
</div>
<div class="flex flex-col items-center justify-center text-[#101c2e]/60 dark:text-slate-400 px-4 py-2 hover:bg-blue-50/50 dark:hover:bg-slate-800/50 transition-colors">
<span class="material-symbols-outlined" data-icon="payments">payments</span>
<span class="text-[11px] font-medium leading-none mt-1">المدفوعات</span>
</div>
<div class="flex flex-col items-center justify-center text-[#101c2e]/60 dark:text-slate-400 px-4 py-2 hover:bg-blue-50/50 dark:hover:bg-slate-800/50 transition-colors">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="text-[11px] font-medium leading-none mt-1">الحساب</span>
</div>
</div>
</nav>
</body></html>
