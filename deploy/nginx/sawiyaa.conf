server {
    listen 80;
    listen [::]:80;
    server_name sawiyaa.com www.sawiyaa.com;
    client_max_body_size 25m;

    # For production, redirect plain HTTP to HTTPS after certificates are installed.
    return 301 https://sawiyaa.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sawiyaa.com www.sawiyaa.com;
    client_max_body_size 25m;

    if ($host = www.sawiyaa.com) {
        return 301 https://sawiyaa.com$request_uri;
    }

    # Certbot / SSL paths. Mount real certificates here before enabling live traffic.
    ssl_certificate     /etc/letsencrypt/live/sawiyaa.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sawiyaa.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(self), microphone=(self), geolocation=(), payment=(self), usb=(), display-capture=(self), fullscreen=(self)" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host $host;

    location ^~ /api/auth/ {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location ^~ /api/v1/ {
        proxy_pass http://backend:7000;
        proxy_http_version 1.1;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location = /api/docs {
        return 404;
    }

    location ^~ /api/docs/ {
        return 404;
    }

    location ^~ /socket.io/ {
        proxy_pass http://backend:7000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    location ^~ /article-covers/ {
        proxy_pass http://backend:7000;
        proxy_http_version 1.1;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
