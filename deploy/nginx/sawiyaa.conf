server {
    listen 80;
    listen [::]:80;
    server_name sawiyaa.com www.sawiyaa.com;
    client_max_body_size 25m;

    # For production, redirect plain HTTP to HTTPS after certificates are installed.
    return 301 https://sawiyaa.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sawiyaa.com www.sawiyaa.com;
    client_max_body_size 25m;

    # Cloudflare's current published IPv4/IPv6 ranges. These directives make
    # CF-Connecting-IP trustworthy only when the immediate peer is Cloudflare.
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header CF-Connecting-IP;
    real_ip_recursive on;

    if ($host = www.sawiyaa.com) {
        return 301 https://sawiyaa.com$request_uri;
    }

    # Certbot / SSL paths. Mount real certificates here before enabling live traffic.
    ssl_certificate     /etc/letsencrypt/live/sawiyaa.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sawiyaa.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(self), microphone=(self), geolocation=(), payment=(self), usb=(), display-capture=(self), fullscreen=(self)" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    proxy_set_header Host $host;
    # Replace client-provided forwarding chains. The origin is reachable only
    # through this proxy; Cloudflare origin firewall rules are required in prod.
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Real-IP $remote_addr;

    location ^~ /api/auth/ {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location ^~ /api/v1/ {
        proxy_pass http://backend:7000;
        proxy_http_version 1.1;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location = /api/docs {
        return 404;
    }

    location ^~ /api/docs/ {
        return 404;
    }

    location ^~ /socket.io/ {
        proxy_pass http://backend:7000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    location ^~ /article-covers/ {
        proxy_pass http://backend:7000;
        proxy_http_version 1.1;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
