<!DOCTYPE html>

<html dir="rtl" lang="ar"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>سجل المعاملات</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600;700&amp;family=Amiri:wght@400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-container-highest": "#e0e2e7",
                    "primary-fixed": "#d5e3ff",
                    "on-primary-container": "#fefcff",
                    "surface-container-lowest": "#ffffff",
                    "surface-container-low": "#f1f4f9",
                    "on-tertiary-fixed-variant": "#683d00",
                    "on-secondary-fixed": "#0a1c34",
                    "on-secondary-container": "#51617e",
                    "error-container": "#ffdad6",
                    "on-error": "#ffffff",
                    "inverse-surface": "#2d3135",
                    "tertiary-container": "#a86500",
                    "surface-container": "#eceef3",
                    "outline": "#727783",
                    "surface-bright": "#f7f9fe",
                    "primary-container": "#3575c7",
                    "on-surface-variant": "#424751",
                    "on-secondary-fixed-variant": "#374762",
                    "surface-variant": "#e0e2e7",
                    "secondary-container": "#cdddff",
                    "outline-variant": "#c2c6d3",
                    "secondary": "#4f5f7b",
                    "secondary-fixed": "#d6e3ff",
                    "surface-container-high": "#e6e8ed",
                    "tertiary-fixed-dim": "#ffb86b",
                    "tertiary-fixed": "#ffdcbc",
                    "inverse-on-surface": "#eff1f6",
                    "primary": "#0b5cac",
                    "on-primary": "#ffffff",
                    "inverse-primary": "#a7c8ff",
                    "on-background": "#181c20",
                    "surface-tint": "#125eae",
                    "surface-dim": "#d8dadf",
                    "on-secondary": "#ffffff",
                    "on-primary-fixed-variant": "#004689",
                    "surface": "#f7f9fe",
                    "on-error-container": "#93000a",
                    "on-tertiary": "#ffffff",
                    "error": "#ba1a1a",
                    "on-primary-fixed": "#001b3c",
                    "primary-fixed-dim": "#a7c8ff",
                    "on-surface": "#181c20",
                    "on-tertiary-container": "#fffbff",
                    "on-tertiary-fixed": "#2c1700",
                    "secondary-fixed-dim": "#b7c7e8",
                    "tertiary": "#854f00",
                    "background": "#f7f9fe"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "spacing": {},
            "fontFamily": {
                    "headline": [
                            "Manrope", "Amiri", "sans-serif"
                    ],
                    "body": [
                            "Inter", "sans-serif"
                    ],
                    "label": [
                            "Inter", "sans-serif"
                    ]
            }
    },
        },
      }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3, h4, h5, h6, .font-headline { font-family: 'Manrope', 'Amiri', sans-serif; letter-spacing: -0.02em; }
        .ambient-shadow { box-shadow: 0 4px 20px rgba(24, 28, 32, 0.05); }
        .glass-panel { background-color: rgba(241, 244, 249, 0.85); backdrop-filter: blur(24px); }
        .ghost-border { border: 1px solid rgba(194, 198, 211, 0.2); }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col antialiased">
<!-- TopAppBar -->
<header class="docked w-full top-0 sticky bg-slate-200/85 dark:bg-slate-800/85 backdrop-blur-2xl flex items-center justify-between w-full h-16 px-6 shadow-[0_4px_20px_rgba(24,28,32,0.05)] z-40">
<div class="flex items-center gap-4">
<button class="text-blue-800 dark:text-blue-300 hover:bg-slate-300/50 dark:hover:bg-slate-700/50 transition-colors p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" style="transform: scaleX(-1);">arrow_back</span>
</button>
<h1 class="font-manrope tracking-tight font-bold text-lg text-slate-900 dark:text-slate-100">سجل المعاملات</h1>
</div>
<div class="text-xl font-bold font-manrope text-slate-900 dark:text-slate-100">
            Sanctuary
        </div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow px-4 md:px-8 py-6 pb-32 max-w-4xl mx-auto w-full">
<!-- Summary Card -->
<section class="mb-8 relative rounded-xl bg-surface-container-lowest ambient-shadow ghost-border overflow-hidden p-6 flex flex-col gap-2">
<div class="absolute inset-y-0 inline-start-0 w-1 bg-surface-tint"></div>
<h2 class="font-headline text-on-surface-variant text-sm font-medium">الرصيد الحالي</h2>
<div class="flex items-baseline gap-2">
<span class="font-headline text-4xl font-extrabold text-on-surface">1,250.00</span>
<span class="font-body text-on-surface-variant font-medium text-lg">SAR</span>
</div>
</section>
<!-- Filters / Sorting -->
<section class="mb-6 flex gap-3 overflow-x-auto pb-2 scrollbar-hide">
<button class="bg-primary text-on-primary font-label text-sm px-4 py-2 rounded-md whitespace-nowrap">الكل</button>
<button class="bg-surface-container-high text-on-surface-variant font-label text-sm px-4 py-2 rounded-md whitespace-nowrap hover:bg-surface-container-highest transition-colors">المدفوعات</button>
<button class="bg-surface-container-high text-on-surface-variant font-label text-sm px-4 py-2 rounded-md whitespace-nowrap hover:bg-surface-container-highest transition-colors">الإيداعات</button>
<button class="bg-surface-container-high text-on-surface-variant font-label text-sm px-4 py-2 rounded-md whitespace-nowrap hover:bg-surface-container-highest transition-colors">المستردة</button>
</section>
<!-- Transaction List -->
<section class="flex flex-col gap-4">
<!-- Date Group -->
<div>
<h3 class="font-body text-xs font-semibold text-on-surface-variant mb-3 uppercase tracking-wider">اليوم</h3>
<div class="flex flex-col gap-3">
<!-- Item 1: Session Payment -->
<div class="bg-surface-container-lowest p-4 rounded-xl ghost-border flex items-center justify-between ambient-shadow transition-transform active:scale-[0.98]">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-surface-container-low flex items-center justify-center text-primary">
<span class="material-symbols-outlined">payments</span>
</div>
<div class="flex flex-col">
<span class="font-body font-semibold text-on-surface">دفع جلسة</span>
<span class="font-body text-xs text-on-surface-variant mt-1">د. أحمد خالد - استشارة نفسية</span>
</div>
</div>
<div class="flex flex-col items-end">
<span class="font-headline font-bold text-on-surface" dir="ltr">- 350.00 SAR</span>
<span class="font-label text-[10px] text-primary mt-1 bg-primary-fixed/30 px-2 py-0.5 rounded-sm">مكتمل</span>
</div>
</div>
<!-- Item 2: Funds Added -->
<div class="bg-surface-container-lowest p-4 rounded-xl ghost-border flex items-center justify-between ambient-shadow transition-transform active:scale-[0.98]">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-surface-container-low flex items-center justify-center text-primary">
<span class="material-symbols-outlined">add_card</span>
</div>
<div class="flex flex-col">
<span class="font-body font-semibold text-on-surface">إضافة رصيد</span>
<span class="font-body text-xs text-on-surface-variant mt-1">عبر البطاقة الائتمانية **** 1234</span>
</div>
</div>
<div class="flex flex-col items-end">
<span class="font-headline font-bold text-primary" dir="ltr">+ 500.00 SAR</span>
<span class="font-label text-[10px] text-primary mt-1 bg-primary-fixed/30 px-2 py-0.5 rounded-sm">مكتمل</span>
</div>
</div>
</div>
</div>
<!-- Date Group -->
<div class="mt-4">
<h3 class="font-body text-xs font-semibold text-on-surface-variant mb-3 uppercase tracking-wider">12 أكتوبر 2023</h3>
<div class="flex flex-col gap-3">
<!-- Item 3: Refund Issued -->
<div class="bg-surface-container-lowest p-4 rounded-xl ghost-border flex items-center justify-between ambient-shadow transition-transform active:scale-[0.98]">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-surface-container-low flex items-center justify-center text-tertiary">
<span class="material-symbols-outlined">currency_exchange</span>
</div>
<div class="flex flex-col">
<span class="font-body font-semibold text-on-surface">استرداد مبلغ</span>
<span class="font-body text-xs text-on-surface-variant mt-1">إلغاء جلسة - د. سارة علي</span>
</div>
</div>
<div class="flex flex-col items-end">
<span class="font-headline font-bold text-primary" dir="ltr">+ 250.00 SAR</span>
<span class="font-label text-[10px] text-tertiary mt-1 bg-tertiary-fixed/30 px-2 py-0.5 rounded-sm">قيد المعالجة</span>
</div>
</div>
</div>
</div>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 rounded-t-2xl bg-slate-100/85 dark:bg-slate-900/85 backdrop-blur-2xl shadow-[0_-4px_30px_rgba(24,28,32,0.08)] fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-safe pt-2 border-t border-slate-200/20 md:hidden">
<button class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 px-5 py-2 hover:text-blue-700 dark:hover:text-blue-200 Active: scale-90 transition-transform duration-200">
<span class="material-symbols-outlined mb-1">calendar_today</span>
<span class="font-inter text-[11px] font-medium tracking-wide uppercase text-blue-800 dark:text-blue-400">Sessions</span>
</button>
<button class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 px-5 py-2 hover:text-blue-700 dark:hover:text-blue-200 Active: scale-90 transition-transform duration-200">
<span class="material-symbols-outlined mb-1">person_search</span>
<span class="font-inter text-[11px] font-medium tracking-wide uppercase text-blue-800 dark:text-blue-400">Matching</span>
</button>
<button class="flex flex-col items-center justify-center text-blue-800 dark:text-blue-300 bg-blue-50 dark:bg-blue-900/30 rounded-2xl px-5 py-2 hover:text-blue-700 dark:hover:text-blue-200 Active: scale-90 transition-transform duration-200">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">account_balance_wallet</span>
<span class="font-inter text-[11px] font-medium tracking-wide uppercase text-blue-800 dark:text-blue-400">Wallet</span>
</button>
<button class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 px-5 py-2 hover:text-blue-700 dark:hover:text-blue-200 Active: scale-90 transition-transform duration-200">
<span class="material-symbols-outlined mb-1">person</span>
<span class="font-inter text-[11px] font-medium tracking-wide uppercase text-blue-800 dark:text-blue-400">Profile</span>
</button>
</nav>
</body></html>
