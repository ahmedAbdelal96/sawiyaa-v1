<!DOCTYPE html>

<html class="light" dir="rtl" lang="ar"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sanctuary - Therapist Preferences</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600;700&amp;family=Amiri:ital,wght@0,400;0,700;1,400;1,700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary": "#ffffff",
                        "error-container": "#ffdad6",
                        "tertiary": "#854f00",
                        "inverse-on-surface": "#eff1f6",
                        "on-error-container": "#93000a",
                        "tertiary-fixed-dim": "#ffb86b",
                        "on-primary-fixed-variant": "#004689",
                        "on-background": "#181c20",
                        "primary-fixed": "#d5e3ff",
                        "on-tertiary-container": "#fffbff",
                        "surface-container-highest": "#e0e2e7",
                        "on-surface-variant": "#424751",
                        "secondary-container": "#cdddff",
                        "error": "#ba1a1a",
                        "primary-fixed-dim": "#a7c8ff",
                        "inverse-primary": "#a7c8ff",
                        "tertiary-fixed": "#ffdcbc",
                        "secondary-fixed": "#d6e3ff",
                        "surface-container-low": "#f1f4f9",
                        "background": "#f7f9fe",
                        "primary-container": "#3575c7",
                        "on-error": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "on-primary-container": "#fefcff",
                        "tertiary-container": "#a86500",
                        "surface-bright": "#f7f9fe",
                        "secondary-fixed-dim": "#b7c7e8",
                        "on-tertiary-fixed": "#2c1700",
                        "surface": "#f7f9fe",
                        "outline-variant": "#c2c6d3",
                        "outline": "#727783",
                        "surface-variant": "#e0e2e7",
                        "surface-container": "#eceef3",
                        "secondary": "#4f5f7b",
                        "on-surface": "#181c20",
                        "surface-container-high": "#e6e8ed",
                        "surface-dim": "#d8dadf",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary-container": "#51617e",
                        "on-secondary-fixed-variant": "#374762",
                        "primary": "#0b5cac",
                        "on-secondary-fixed": "#0a1c34",
                        "on-primary-fixed": "#001b3c",
                        "inverse-surface": "#2d3135",
                        "on-primary": "#ffffff",
                        "surface-tint": "#125eae",
                        "on-tertiary-fixed-variant": "#683d00"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "fontFamily": {
                        "headline": ["Amiri", "Manrope", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Inter", "sans-serif"]
                    }
                }
            }
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: theme('colors.surface');
            color: theme('colors.on-surface');
            /* Fallback for Arabic RTL */
            font-family: 'Amiri', 'Inter', sans-serif; 
        }
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Amiri', 'Manrope', serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="min-h-screen flex flex-col items-center justify-center bg-surface pb-24 md:pb-0">
<!-- Top App Bar (Modified for transactional flow - suppress standard nav, keep branding/back) -->
<header class="fixed top-0 w-full z-50 bg-[#f1f4f9]/85 dark:bg-slate-950/85 backdrop-blur-[24px] shadow-[0_8px_40px_rgba(24,28,32,0.08)] dark:shadow-none flex justify-between items-center px-6 h-20 rtl:flex-row-reverse border-b border-[#c2c6d3]/20">
<div class="flex items-center gap-4">
<button aria-label="Go back" class="text-on-surface hover:bg-slate-200/50 p-2 rounded-full transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined rtl:rotate-180">arrow_back</span>
</button>
<h1 class="font-['Manrope'] tracking-[-0.02em] font-bold text-[#181c20] text-xl">Sanctuary</h1>
</div>
<button class="text-primary font-bold hover:bg-slate-200/50 px-4 py-2 rounded-full transition-colors">
            تخطي
        </button>
</header>
<!-- Main Content Area -->
<main class="w-full max-w-2xl px-6 pt-32 pb-12 flex-grow flex flex-col">
<!-- Progress Indicator -->
<div class="w-full mb-10">
<div class="flex justify-between text-sm text-outline mb-2 font-label font-medium tracking-[0.05em] uppercase">
<span>الخطوة 3 من 5</span>
<span>60%</span>
</div>
<div class="h-2 w-full bg-surface-container-high rounded-full overflow-hidden flex flex-row-reverse">
<div class="h-full bg-primary rounded-full transition-all duration-500 ease-in-out" style="width: 60%;"></div>
</div>
</div>
<!-- Question Header -->
<div class="mb-10 text-right">
<h2 class="text-3xl font-headline font-bold text-on-surface mb-4 leading-tight tracking-[-0.02em]">ما الذي تبحث عنه في المعالج؟</h2>
<p class="text-lg text-on-surface-variant font-body leading-relaxed">تساعدنا هذه التفضيلات في مطابقتك مع أفضل معالج يناسب احتياجاتك. يمكنك اختيار أكثر من خيار.</p>
</div>
<!-- Selection Cards (Bento-style grid) -->
<div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-12 flex-grow">
<!-- Option 1: Gender -->
<label class="relative cursor-pointer group">
<input class="peer sr-only" type="checkbox"/>
<div class="h-full p-6 bg-surface-container-lowest rounded-xl border border-outline-variant/20 shadow-[0_4px_20px_rgba(24,28,32,0.05)] transition-all duration-200 peer-checked:border-primary peer-checked:shadow-[0_4px_20px_rgba(11,92,172,0.15)] peer-checked:bg-primary-fixed/10 hover:shadow-[0_8px_30px_rgba(24,28,32,0.08)] flex flex-col">
<div class="flex justify-between items-start mb-4">
<span class="material-symbols-outlined text-3xl text-primary" data-weight="fill" style="font-variation-settings: 'FILL' 1;">wc</span>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant peer-checked:bg-primary peer-checked:border-primary flex items-center justify-center opacity-0 peer-checked:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-white text-sm">check</span>
</div>
</div>
<h3 class="text-xl font-bold text-on-surface mb-2 font-body">الجنس المفضل</h3>
<p class="text-sm text-on-surface-variant font-body">ذكر، أنثى، أو لا يهم</p>
</div>
</label>
<!-- Option 2: Language -->
<label class="relative cursor-pointer group">
<input checked="" class="peer sr-only" type="checkbox"/>
<div class="h-full p-6 bg-surface-container-lowest rounded-xl border border-primary shadow-[0_4px_20px_rgba(11,92,172,0.15)] bg-primary-fixed/10 transition-all duration-200 hover:shadow-[0_8px_30px_rgba(24,28,32,0.08)] flex flex-col">
<div class="flex justify-between items-start mb-4">
<span class="material-symbols-outlined text-3xl text-primary" data-weight="fill" style="font-variation-settings: 'FILL' 1;">translate</span>
<div class="w-6 h-6 rounded-full bg-primary border-2 border-primary flex items-center justify-center">
<span class="material-symbols-outlined text-white text-sm">check</span>
</div>
</div>
<h3 class="text-xl font-bold text-on-surface mb-2 font-body">اللغة</h3>
<p class="text-sm text-on-surface-variant font-body">العربية، الإنجليزية، وغيرها</p>
</div>
</label>
<!-- Option 3: Specialty -->
<label class="relative cursor-pointer group">
<input class="peer sr-only" type="checkbox"/>
<div class="h-full p-6 bg-surface-container-lowest rounded-xl border border-outline-variant/20 shadow-[0_4px_20px_rgba(24,28,32,0.05)] transition-all duration-200 peer-checked:border-primary peer-checked:shadow-[0_4px_20px_rgba(11,92,172,0.15)] peer-checked:bg-primary-fixed/10 hover:shadow-[0_8px_30px_rgba(24,28,32,0.08)] flex flex-col">
<div class="flex justify-between items-start mb-4">
<span class="material-symbols-outlined text-3xl text-primary" data-weight="fill" style="font-variation-settings: 'FILL' 1;">psychology</span>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant peer-checked:bg-primary peer-checked:border-primary flex items-center justify-center opacity-0 peer-checked:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-white text-sm">check</span>
</div>
</div>
<h3 class="text-xl font-bold text-on-surface mb-2 font-body">التخصص</h3>
<p class="text-sm text-on-surface-variant font-body">القلق، الاكتئاب، العلاقات، إلخ</p>
</div>
</label>
<!-- Option 4: Therapy Style -->
<label class="relative cursor-pointer group">
<input class="peer sr-only" type="checkbox"/>
<div class="h-full p-6 bg-surface-container-lowest rounded-xl border border-outline-variant/20 shadow-[0_4px_20px_rgba(24,28,32,0.05)] transition-all duration-200 peer-checked:border-primary peer-checked:shadow-[0_4px_20px_rgba(11,92,172,0.15)] peer-checked:bg-primary-fixed/10 hover:shadow-[0_8px_30px_rgba(24,28,32,0.08)] flex flex-col">
<div class="flex justify-between items-start mb-4">
<span class="material-symbols-outlined text-3xl text-primary" data-weight="fill" style="font-variation-settings: 'FILL' 1;">forum</span>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant peer-checked:bg-primary peer-checked:border-primary flex items-center justify-center opacity-0 peer-checked:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-white text-sm">check</span>
</div>
</div>
<h3 class="text-xl font-bold text-on-surface mb-2 font-body">أسلوب العلاج</h3>
<p class="text-sm text-on-surface-variant font-body">مباشر، داعم، تحليلي</p>
</div>
</label>
</div>
<!-- Primary Action Area -->
<div class="mt-auto pt-6 border-t border-outline-variant/20 flex flex-col gap-4">
<button class="w-full bg-gradient-to-br from-[#0b5cac] to-[#3575c7] text-white font-bold py-4 px-6 rounded-xl shadow-[0_4px_14px_rgba(11,92,172,0.39)] hover:shadow-[0_6px_20px_rgba(11,92,172,0.23)] transition-all duration-200 active:scale-95 text-lg font-body flex items-center justify-center gap-2">
<span>متابعة</span>
<span class="material-symbols-outlined rtl:-scale-x-100">arrow_forward</span>
</button>
</div>
</main>
</body></html>
