<!DOCTYPE html>

<html dir="rtl" lang="ar"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>تصفية المعالجين</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Manrope:wght@400;500;600;700;800&amp;family=Amiri:wght@400;700&amp;family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary": "#ffffff",
                        "error-container": "#ffdad6",
                        "tertiary": "#854f00",
                        "inverse-on-surface": "#eff1f6",
                        "on-error-container": "#93000a",
                        "tertiary-fixed-dim": "#ffb86b",
                        "on-primary-fixed-variant": "#004689",
                        "on-background": "#181c20",
                        "primary-fixed": "#d5e3ff",
                        "on-tertiary-container": "#fffbff",
                        "surface-container-highest": "#e0e2e7",
                        "on-surface-variant": "#424751",
                        "secondary-container": "#cdddff",
                        "error": "#ba1a1a",
                        "primary-fixed-dim": "#a7c8ff",
                        "inverse-primary": "#a7c8ff",
                        "tertiary-fixed": "#ffdcbc",
                        "secondary-fixed": "#d6e3ff",
                        "surface-container-low": "#f1f4f9",
                        "background": "#f7f9fe",
                        "primary-container": "#3575c7",
                        "on-error": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "on-primary-container": "#fefcff",
                        "tertiary-container": "#a86500",
                        "surface-bright": "#f7f9fe",
                        "secondary-fixed-dim": "#b7c7e8",
                        "on-tertiary-fixed": "#2c1700",
                        "surface": "#f7f9fe",
                        "outline-variant": "#c2c6d3",
                        "outline": "#727783",
                        "surface-variant": "#e0e2e7",
                        "surface-container": "#eceef3",
                        "secondary": "#4f5f7b",
                        "on-surface": "#181c20",
                        "surface-container-high": "#e6e8ed",
                        "surface-dim": "#d8dadf",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary-container": "#51617e",
                        "on-secondary-fixed-variant": "#374762",
                        "primary": "#0b5cac",
                        "on-secondary-fixed": "#0a1c34",
                        "on-primary-fixed": "#001b3c",
                        "inverse-surface": "#2d3135",
                        "on-primary": "#ffffff",
                        "surface-tint": "#125eae",
                        "on-tertiary-fixed-variant": "#683d00"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "fontFamily": {
                        "headline": ["IBM Plex Sans Arabic", "Manrope", "sans-serif"],
                        "body": ["IBM Plex Sans Arabic", "Inter", "sans-serif"],
                        "label": ["IBM Plex Sans Arabic", "Inter", "sans-serif"]
                    }
                }
            }
        }
    </script>
<style>
        body { font-family: 'IBM Plex Sans Arabic', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface min-h-screen antialiased flex flex-col items-center justify-end md:justify-center p-0 md:p-6">
<!-- Modal Overlay (Desktop) / Background Tint (Mobile) -->
<div class="fixed inset-0 bg-on-surface/40 backdrop-blur-sm z-40 hidden md:block"></div>
<!-- Filter Bottom Sheet / Modal -->
<main class="w-full max-w-md bg-surface-container-lowest rounded-t-[32px] md:rounded-[24px] shadow-[0_-8px_40px_rgba(24,28,32,0.1)] md:shadow-[0_8px_40px_rgba(24,28,32,0.08)] z-50 flex flex-col h-[751px] md:h-auto overflow-hidden relative">
<!-- Header -->
<header class="flex items-center justify-between p-6 border-b border-outline-variant/20 bg-surface-container-lowest sticky top-0 z-10">
<h1 class="font-headline font-bold text-xl text-on-surface">تصفية النتائج</h1>
<button class="text-primary font-bold font-body text-sm hover:text-primary-container transition-colors">إعادة ضبط</button>
<button class="md:hidden absolute top-4 left-4 p-2 text-on-surface-variant hover:bg-surface-container-low rounded-full transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
</header>
<!-- Scrollable Content -->
<div class="flex-1 overflow-y-auto p-6 space-y-8">
<!-- Specialty Filter -->
<section>
<h2 class="font-headline font-semibold text-lg text-on-surface mb-4">التخصص</h2>
<div class="flex flex-wrap gap-2">
<button class="px-4 py-2 rounded-full border border-primary bg-primary text-on-primary font-body text-sm font-medium transition-all shadow-sm">الاكتئاب</button>
<button class="px-4 py-2 rounded-full border border-outline-variant/50 bg-surface-container-lowest text-on-surface-variant font-body text-sm font-medium hover:bg-surface-container-low transition-all">القلق</button>
<button class="px-4 py-2 rounded-full border border-outline-variant/50 bg-surface-container-lowest text-on-surface-variant font-body text-sm font-medium hover:bg-surface-container-low transition-all">العلاقات</button>
<button class="px-4 py-2 rounded-full border border-outline-variant/50 bg-surface-container-lowest text-on-surface-variant font-body text-sm font-medium hover:bg-surface-container-low transition-all">الصدمات</button>
<button class="px-4 py-2 rounded-full border border-outline-variant/50 bg-surface-container-lowest text-on-surface-variant font-body text-sm font-medium hover:bg-surface-container-low transition-all">اضطرابات النوم</button>
</div>
</section>
<!-- Price Range Filter -->
<section>
<h2 class="font-headline font-semibold text-lg text-on-surface mb-4 flex items-center justify-between">
<span>السعر (للجلسة)</span>
<span class="text-sm font-normal text-on-surface-variant">١٥٠ - ٤٠٠ ر.س</span>
</h2>
<div class="px-2 pt-4 pb-2">
<!-- Simple dual range representation -->
<div class="relative h-1 bg-surface-container-highest rounded-full">
<div class="absolute inset-y-0 start-[20%] end-[30%] bg-primary rounded-full"></div>
<div class="absolute top-1/2 -translate-y-1/2 start-[20%] w-5 h-5 bg-surface-container-lowest border-2 border-primary rounded-full shadow-sm cursor-pointer transform -translate-x-1/2"></div>
<div class="absolute top-1/2 -translate-y-1/2 end-[30%] w-5 h-5 bg-surface-container-lowest border-2 border-primary rounded-full shadow-sm cursor-pointer transform translate-x-1/2"></div>
</div>
<div class="flex justify-between mt-4 text-xs font-body text-on-surface-variant">
<span>٥٠ ر.س</span>
<span>١٠٠٠+ ر.س</span>
</div>
</div>
</section>
<!-- Gender Filter -->
<section>
<h2 class="font-headline font-semibold text-lg text-on-surface mb-4">جنس المعالج</h2>
<div class="flex gap-3">
<button class="flex-1 py-3 rounded-xl border border-primary bg-primary/5 text-primary font-body text-sm font-medium transition-all text-center">الكل</button>
<button class="flex-1 py-3 rounded-xl border border-outline-variant/50 bg-surface-container-lowest text-on-surface-variant font-body text-sm font-medium hover:bg-surface-container-low transition-all text-center">ذكر</button>
<button class="flex-1 py-3 rounded-xl border border-outline-variant/50 bg-surface-container-lowest text-on-surface-variant font-body text-sm font-medium hover:bg-surface-container-low transition-all text-center">أنثى</button>
</div>
</section>
<!-- Availability Filter -->
<section>
<h2 class="font-headline font-semibold text-lg text-on-surface mb-4">التوفر</h2>
<div class="space-y-3">
<label class="flex items-center gap-3 p-3 rounded-xl border border-outline-variant/50 hover:bg-surface-container-low transition-colors cursor-pointer">
<div class="relative flex items-center justify-center w-5 h-5 border-2 border-primary rounded-sm bg-primary text-on-primary">
<span class="material-symbols-outlined text-[14px]" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
<span class="font-body text-sm text-on-surface">متاح هذا الأسبوع</span>
</label>
<label class="flex items-center gap-3 p-3 rounded-xl border border-outline-variant/50 hover:bg-surface-container-low transition-colors cursor-pointer">
<div class="relative flex items-center justify-center w-5 h-5 border-2 border-outline-variant/80 rounded-sm">
</div>
<span class="font-body text-sm text-on-surface">جلسات مسائية (بعد ٥ م)</span>
</label>
<label class="flex items-center gap-3 p-3 rounded-xl border border-outline-variant/50 hover:bg-surface-container-low transition-colors cursor-pointer">
<div class="relative flex items-center justify-center w-5 h-5 border-2 border-outline-variant/80 rounded-sm">
</div>
<span class="font-body text-sm text-on-surface">نهاية الأسبوع</span>
</label>
</div>
</section>
</div>
<!-- Footer Actions -->
<footer class="p-6 border-t border-outline-variant/20 bg-surface-container-lowest/85 backdrop-blur-[24px]">
<button class="w-full py-4 rounded-xl bg-gradient-to-br from-primary to-primary-container text-on-primary font-body font-bold text-base shadow-md hover:opacity-90 active:scale-[0.98] transition-all">
                تطبيق التصفية (١٢ نتيجة)
            </button>
</footer>
</main>
</body></html>
