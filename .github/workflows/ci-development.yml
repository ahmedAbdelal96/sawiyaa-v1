name: Development CI

on:
  push:
    branches:
      - development
  pull_request:
    branches:
      - main

concurrency:
  group: development-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: true
      NODE_ENV: production
      NPM_CONFIG_PRODUCTION: false
      DATABASE_URL: postgresql://placeholder:placeholder@127.0.0.1:5432/placeholder?schema=public
      APP_URL: https://example.invalid
      APP_BASE_URL: https://example.invalid
      CORS_ORIGINS: https://example.invalid
      JWT_ACCESS_SECRET: ci-placeholder
      JWT_REFRESH_SECRET: ci-placeholder
      GOOGLE_CLIENT_ID: ci-placeholder
      GOOGLE_CLIENT_SECRET: ci-placeholder
      GOOGLE_CALLBACK_URL: https://example.invalid/api/v1/auth/google/callback
      STRIPE_PUBLISHABLE_KEY: ci-placeholder
      STRIPE_SECRET_KEY: ci-placeholder
      STRIPE_WEBHOOK_SECRET: ci-placeholder
      NEXT_PUBLIC_API_URL: /api/v1
      API_PROXY_TARGET: http://backend:7000
      NEXT_PUBLIC_APP_NAME: Sawiyaa
      NEXT_PUBLIC_APP_URL: https://example.invalid
      NEXT_PUBLIC_SITE_URL: https://example.invalid
      NEXT_PUBLIC_APP_ENV: production
      NEXT_PUBLIC_SHOW_DETAILED_ERRORS: "false"
      NEXT_PUBLIC_TOKEN_EXPIRY_DAYS: "7"
      NEXT_PUBLIC_REFRESH_TOKEN_EXPIRY_DAYS: "30"
      NEXT_PUBLIC_CHAT_SOCKET_URL: https://example.invalid
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ci-placeholder
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ci-placeholder
      NEXT_PUBLIC_SHOW_TEST_CREDENTIALS: "false"
      NEXT_PUBLIC_PRACTITIONER_LOGIN_OTP_ENABLED: "true"
      NEXT_PUBLIC_ENABLE_ANALYTICS: "false"
      NEXT_PUBLIC_ENABLE_NOTIFICATIONS: "true"
      NEXT_PUBLIC_ENABLE_DEVTOOLS: "false"
      NEXT_PUBLIC_DEBUG_PRACTITIONER_WIZARD: "0"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js for backend
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sawiyaa-backend-v1/package-lock.json

      - name: Diagnostics
        shell: bash
        run: |
          node --version
          npm --version
          if command -v docker >/dev/null 2>&1; then
            docker --version
            docker compose version
          else
            echo "Docker CLI not available in this runner."
          fi

      - name: Install backend dependencies
        working-directory: sawiyaa-backend-v1
        run: npm ci

      - name: Build backend
        working-directory: sawiyaa-backend-v1
        run: npm run build

      - name: Setup Node.js for frontend
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sawiyaa-frontend-v1/package-lock.json

      - name: Install frontend dependencies
        working-directory: sawiyaa-frontend-v1
        run: npm ci

      - name: Build frontend
        working-directory: sawiyaa-frontend-v1
        run: npm run build

      - name: Prepare temporary compose env files
        run: |
          cp sawiyaa-backend-v1/.env.production.backend.example .env.production.backend
          cp sawiyaa-frontend-v1/.env.production.frontend.example .env.production.frontend
          cp .env.production.db.example .env.production.db

      - name: Validate Docker Compose configuration
        run: |
          if command -v docker >/dev/null 2>&1; then
            docker compose -f docker-compose.prod.yml config >/dev/null
          else
            echo "Docker CLI not available in this runner; skipping compose config validation."
          fi
