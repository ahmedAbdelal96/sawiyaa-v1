<!-- Contextual suppression of Navigation Shells: Settings page implies a focused task, so BottomNav/Drawer are omitted to prioritize the canvas. -->
<script>
        // Optional: Add intersection observer for top app bar shadow on scroll
        const topAppBar = document.getElementById('topAppBar');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 10) {
                topAppBar.classList.add('shadow-sm');
                topAppBar.classList.remove('flat', 'no', 'shadows');
            } else {
                topAppBar.classList.remove('shadow-sm');
                topAppBar.classList.add('flat', 'no', 'shadows');
            }
        });
